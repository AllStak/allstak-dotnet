name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/AllStak/AllStak.csproj

      - name: Build
        run: dotnet build src/AllStak/AllStak.csproj --configuration Release --no-restore

      - name: Test
        run: |
          TEST_PROJ=$(find tests test -maxdepth 4 -name '*.csproj' -type f 2>/dev/null | head -n 1)
          if [ -n "$TEST_PROJ" ]; then
            dotnet test "$TEST_PROJ" --configuration Release --verbosity normal
          else
            echo "No test projects found; skipping"
          fi
