name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/AllStak/AllStak.csproj

      - name: Build
        run: dotnet build src/AllStak/AllStak.csproj --configuration Release --no-restore

      - name: Test
        run: |
          if ls tests/**/*.csproj 2>/dev/null 1>&2 || ls test/**/*.csproj 2>/dev/null 1>&2; then
            dotnet test --configuration Release --no-build --verbosity normal
          else
            echo "No test projects found; skipping"
          fi
